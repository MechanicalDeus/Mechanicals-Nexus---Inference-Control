<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" role="img" aria-labelledby="ftitle fdesc">
  <title id="ftitle">Agent-mode flow: one command to structured slice</title>
  <desc id="fdesc">Flow from install through nexus --agent-mode to compact output and optional read_file.</desc>
  <rect width="720" height="200" fill="#0d1117"/>
  <text x="360" y="32" fill="#e6edf3" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="600" text-anchor="middle">--agent-mode in one glance</text>
  <defs>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#e6edf3">
    <rect x="32" y="64" width="120" height="72" rx="8" fill="url(#box)" stroke="#30363d"/>
    <text x="92" y="96" text-anchor="middle" fill="#8b949e" font-size="11">1</text>
    <text x="92" y="114" text-anchor="middle" font-weight="600">pip install</text>
    <text x="92" y="130" text-anchor="middle" font-size="11">nexus-inference</text>
    <text x="180" y="104" fill="#8b949e" font-size="20">’</text>
    <rect x="208" y="64" width="200" height="72" rx="8" fill="url(#box)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="308" y="96" text-anchor="middle" fill="#58a6ff" font-size="11">2</text>
    <text x="308" y="114" text-anchor="middle" font-weight="600">nexus . --agent-mode</text>
    <text x="308" y="130" text-anchor="middle" font-size="11">-q "&"</text>
    <text x="436" y="104" fill="#8b949e" font-size="20">’</text>
    <rect x="464" y="64" width="224" height="72" rx="8" fill="url(#box)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="576" y="92" text-anchor="middle" fill="#3fb950" font-size="11">3</text>
    <text x="576" y="110" text-anchor="middle" font-weight="600">Structured slice</text>
    <text x="576" y="126" text-anchor="middle" font-size="11">calls · writes · cap 10</text>
  </g>
  <text x="360" y="176" fill="#6e7681" font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="middle">Then read_file at file:line  no broad grep wall in the prompt</text>
</svg>
